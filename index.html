    // Запуск игры (вызывается после старта)

    }

    // Обновление правой панели (без перерисовки всей структуры)

      const playersData = data.players || {};

      // Лог

        logDiv.innerHTML = data.log.map(item => `<div class="log-item">${item}</div>`).join('');

        select.innerHTML = '<option value="">-- выберите --</option>';
        const playerIds = Object.keys(playersData);
        playerIds.forEach(id => {
          const p = playersData[id];
          const option = document.createElement('option');
          option.value = id;
          option.textContent = `${p.avatarIcon} ${p.name} (${p.points} очков)`;

    // ===== ОБРАБОТКА КЛЕТОК И ВОПРОСОВ (сетевая) =====

    // Главная функция обработки клетки после перемещения
    async function networkProcessCellEffect(playerId, player, position) {
      const pos = position;
      const playerData = player;

      // Счастливые клетки (Фибоначчи)
      if (FIBONACCI_CELLS.includes(pos) && !playerData.stoppedOnFibonacci.includes(pos)) {
        playerData.stoppedOnFibonacci.push(pos);
        await roomRef.child('players/' + playerId + '/stoppedOnFibonacci').set(playerData.stoppedOnFibonacci);
        const logEntry = playerData.name + ' остановился на счастливой клетке ' + pos + '!';
        const currentLog = (await roomRef.child('log').once('value')).val() || [];
        currentLog.push(logEntry);
        await roomRef.child('log').set(currentLog);
      }

      // Ловушка – откат и вопрос
      if (Object.prototype.hasOwnProperty.call(SPECIAL_BACK_CELLS, pos)) {
        const backTo = SPECIAL_BACK_CELLS[pos];
        playerData.trapHits += 1;
        await roomRef.child('players/' + playerId + '/trapHits').set(playerData.trapHits);
        const logEntry = playerData.name + ' попал в ловушку и отступает на 2 клетки.';
        const currentLog = (await roomRef.child('log').once('value')).val() || [];
        currentLog.push(logEntry);
        await roomRef.child('log').set(currentLog);
        // Откатываем позицию
        await roomRef.child('players/' + playerId + '/position').set(backTo);
        // После ловушки задаём обычный вопрос (если есть)
        const q = getRandomNormalQuestion();
        if (q) {
          await networkOpenQuestion(q, 'Случайный вопрос после ловушки', 'normal', playerId);
        } else {
          const logEntry2 = 'Обычные вопросы закончились.';
          const currentLog2 = (await roomRef.child('log').once('value')).val() || [];
          currentLog2.push(logEntry2);
          await roomRef.child('log').set(currentLog2);
          // Переход хода, т.к. вопроса нет
          await networkNextTurn();
        }
        return;
      }

      // Специальная клетка (уникальное задание)
      if (SPECIAL_TASK_CELLS.includes(pos)) {
        playerData.visitedSpecialCells.push(pos);
        await roomRef.child('players/' + playerId + '/visitedSpecialCells').set(playerData.visitedSpecialCells);
        const task = getRandomSpecialQuestion();
        await networkOpenQuestion(task, 'Уникальное задание на клетке ' + pos, 'special', playerId);
        return;
      }

      // Финальная клетка
      if (pos === FINAL_CELL) {
        const finalQuestion = getRandomFinalQuestion();
        await networkOpenQuestion(finalQuestion, 'Финальный вопрос на 50-й клетке', 'final50', playerId);
        return;
      }

      // Обычная клетка (1-49, кроме особых)
      if (pos >= 1 && pos < FINAL_CELL) {
        const q = getRandomNormalQuestion();
        if (q) {
          await networkOpenQuestion(q, 'Случайный вопрос', 'normal', playerId);
        } else {
          const logEntry = 'Обычные вопросы закончились.';
          const currentLog = (await roomRef.child('log').once('value')).val() || [];
          currentLog.push(logEntry);
          await roomRef.child('log').set(currentLog);
          // Переход хода
          await networkNextTurn();
        }
      }
    }

    // Функции получения вопросов (из загруженных массивов)
    function getRandomNormalQuestion() {
      if (!window.normalQuestions || window.normalQuestions.length === 0) return null;
      const idx = Math.floor(Math.random() * window.normalQuestions.length);
      return { ...window.normalQuestions[idx] };
    }

    function getRandomSpecialQuestion() {
      if (!window.specialQuestions || window.specialQuestions.length === 0) {
        return { question: 'Уникальное задание (нет загруженных заданий)', answer: 'Ответ не загружен', points: 1 };
      }
      const idx = Math.floor(Math.random() * window.specialQuestions.length);
      return { ...window.specialQuestions[idx] };
    }

    function getRandomFinalQuestion() {
      const finals = window.normalQuestions.filter(q => Number(q.points) === FINAL_QUESTION_POINTS);
      if (finals.length) {
        const idx = Math.floor(Math.random() * finals.length);
        return { ...finals[idx] };
      }
      return { question: 'Финальный вопрос для 50-й клетки', answer: 'Ответ не загружен', points: FINAL_QUESTION_POINTS, fallback: true };
    }

    // Открытие вопроса (сохраняем в Firebase, ведущий увидит и откроет модалку)
    async function networkOpenQuestion(questionObj, title, context, playerId) {
      await roomRef.child('pendingQuestion').set({
        question: questionObj.question,
        answer: questionObj.answer,
        points: questionObj.points,
        imageUrl: questionObj.imageUrl || null,
        context: context,
        playerId: playerId,
        timestamp: Date.now()
      });
      // Для игроков (не ведущих) пишем в лог
      if (networkRole !== 'host') {
        const snapshot = await roomRef.child('players/' + playerId + '/name').once('value');
        const playerName = snapshot.val() || 'игрок';
        const logEntry = 'Вопрос для ' + playerName + ': ' + questionObj.question;
        const currentLog = (await roomRef.child('log').once('value')).val() || [];
        currentLog.push(logEntry);
        await roomRef.child('log').set(currentLog);
      }
    }

    // Обработка ответа на вопрос (вызывается ведущим из модального окна)
    async function networkAnswerQuestion(isCorrect) {
      const snapshot = await roomRef.child('pendingQuestion').once('value');
      const q = snapshot.val();
      if (!q) return;
      const playerId = q.playerId;
      const context = q.context;
      const points = Number(q.points) || 0;

      // Получаем данные игрока
      const playerRef = roomRef.child('players/' + playerId);
      const playerSnapshot = await playerRef.once('value');
      const player = playerSnapshot.val();
      if (!player) return;

      // Обновляем статистику
      player.asked = (player.asked || 0) + 1;
      if (isCorrect) {
        player.correct = (player.correct || 0) + 1;
        player.totalCorrect = (player.totalCorrect || 0) + 1;
        player.consecutiveCorrect = (player.consecutiveCorrect || 0) + 1;
        player.points = (player.points || 0) + points;

        if (context === 'final50') {
          // Проверяем, не был ли уже первый финишировавший
          const firstWinner = (await roomRef.child('firstFinalWinnerId').once('value')).val();
          if (!firstWinner) {
            await roomRef.child('firstFinalWinnerId').set(playerId);
            player.points += FINAL_SUCCESS_BONUS;
          }
          player.finished = true;
          const finishCounter = (await roomRef.child('finishCounter').once('value')).val() || 0;
          await roomRef.child('finishCounter').set(finishCounter + 1);
          player.finishOrder = finishCounter + 1;
        }
        const logEntry = player.name + ' ответил правильно! +' + points + ' баллов.';
        const currentLog = (await roomRef.child('log').once('value')).val() || [];
        currentLog.push(logEntry);
        await roomRef.child('log').set(currentLog);
      } else {
        player.totalIncorrect = (player.totalIncorrect || 0) + 1;
        player.consecutiveCorrect = 0;
        if (context === 'final50') {
          player.position = FINAL_CELL; // остаётся на финале, но не завершает
          const logEntry = player.name + ' ошибся в финальном вопросе. Остаётся на месте.';
          const currentLog = (await roomRef.child('log').once('value')).val() || [];
          currentLog.push(logEntry);
          await roomRef.child('log').set(currentLog);
        } else if (context === 'normal') {
          const backTo = Math.max(0, player.position - 2);
          player.position = backTo;
          const logEntry = player.name + ' ответил неверно и отступает на 2 клетки.';
          const currentLog = (await roomRef.child('log').once('value')).val() || [];
          currentLog.push(logEntry);
          await roomRef.child('log').set(currentLog);
        } else {
          const logEntry = player.name + ' получил 0 баллов за задание.';
          const currentLog = (await roomRef.child('log').once('value')).val() || [];
          currentLog.push(logEntry);
          await roomRef.child('log').set(currentLog);
        }
      }

      // Сохраняем обновлённые данные
      await playerRef.update(player);

      // Удаляем вопрос
      await roomRef.child('pendingQuestion').remove();

      // Проверяем, не завершили ли все игроки
      const allPlayers = (await roomRef.child('players').once('value')).val();
      const finishedAll = Object.values(allPlayers || {}).every(p => p.finished === true);
      if (finishedAll) {
        await roomRef.child('gameFinished').set(true);
        // Можно показать результаты (здесь не реализовано, но можно добавить)
      } else {
        // Переход хода (если игрок не финишировал или финишировал, но есть другие)
        // Но если игрок финишировал, его не должно быть в очереди. В функции networkNextTurn мы пропускаем finished.
        await networkNextTurn();
      }
    }

    // Переход хода (пропуская завершивших)
    async function networkNextTurn() {
      const snapshot = await roomRef.once('value');
      const data = snapshot.val();
      if (!data) return;
      const playersData = data.players || {};
      const playerIds = Object.keys(playersData).filter(id => !playersData[id].finished);
      if (playerIds.length === 0) {
        // Все завершили – игра окончена
        await roomRef.child('gameFinished').set(true);
        return;
      }
      const currentIndex = data.currentPlayerIndex || 0;
      // Находим следующего активного
      let nextIndex = (currentIndex + 1) % Object.keys(playersData).length;
      let safety = 0;
      while (safety < Object.keys(playersData).length + 2) {
        const candidateId = Object.keys(playersData)[nextIndex];
        if (!playersData[candidateId].finished) {
          await roomRef.child('currentPlayerIndex').set(nextIndex);
          await roomRef.child('currentPlayerId').set(candidateId);
          return;
        }
        nextIndex = (nextIndex + 1) % Object.keys(playersData).length;
        safety++;
      }
      // Если все завершили – игра окончена
      await roomRef.child('gameFinished').set(true);
    }

    // Бросок кубика (сетевая версия)
    async function hostRollDiceNetwork() {
      if (isRolling) return;
      isRolling = true;
      const snapshot = await roomRef.once('value');
      const data = snapshot.val();
      if (!data) return;
      const playersData = data.players || {};
      const currentId = data.currentPlayerId;
      const player = playersData[currentId];
      if (!player || player.finished) {
        isRolling = false;
        return;
      }
      const diceEl = document.getElementById('diceResultNetwork');
      for (let i = 0; i < 10; i++) {
        diceEl.textContent = String(Math.floor(Math.random() * 6) + 1);
        await new Promise(r => setTimeout(r, 80));
      }
      const dice = Math.floor(Math.random() * 6) + 1;
      diceEl.textContent = String(dice);
      let target = player.position + dice;
      if (target > MAX_POSITION) target = MAX_POSITION;

      // Обновляем позицию
      await roomRef.child('players/' + currentId + '/position').set(target);

      const logEntry = player.name + ' бросает кость: выпало ' + dice + '.';
      const currentLog = data.log || [];
      currentLog.push(logEntry);
      await roomRef.child('log').set(currentLog);

      // Обрабатываем эффект клетки
      await networkProcessCellEffect(currentId, player, target);

      // Если вопроса нет (процесс сам перейдёт ход), то ничего не делаем.
      // Проверим, есть ли pendingQuestion
      const pending = (await roomRef.child('pendingQuestion').once('value')).val();
      if (!pending) {
        // Если вопроса нет, но process не перешёл ход (например, обычная клетка без вопроса из-за отсутствия вопросов),
        // то переходим ход здесь. Но process уже вызывает networkNextTurn при отсутствии вопроса.
        // Однако для страховки можно проверить.
      }
      isRolling = false;
    }

    // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ ОТРИСОВКИ ПОЛЯ (сеть) =====
    function buildCellsNetwork() { /* ... как ранее ... */ }
    function renderOrnamentsNetwork() { /* ... как ранее ... */ }
    function renderCellsNetwork() { /* ... как ранее ... */ }
    function renderTokensNetwork(playersData) { /* ... как ранее ... */ }

    // ===== ОБРАБОТЧИКИ КНОПОК МОДАЛЬНОГО ОКНА (ведущий) =====
    document.getElementById('answerCorrectBtn').addEventListener('click', function() {
      if (networkRole === 'host') {
        networkAnswerQuestion(true);
        document.getElementById('questionModal').classList.remove('show');
        localStopQuestionTimer();
      }
    });
    document.getElementById('answerWrongBtn').addEventListener('click', function() {
      if (networkRole === 'host') {
        networkAnswerQuestion(false);
        document.getElementById('questionModal').classList.remove('show');
        localStopQuestionTimer();
      }
    });

    // ===== ОБРАБОТЧИКИ МЕНЮ =====
    document.getElementById('menuHostBtn').addEventListener('click', function() { /* ... */ });
    document.getElementById('menuJoinBtn').addEventListener('click', function() { /* ... */ });

    // Автоматическое подключение по параметру room
    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam) {
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('gameLayoutNetwork').classList.remove('hidden');
      document.getElementById('joinRoomId').value = roomParam;
      document.getElementById('joinConnectBtn').click();
    }

    console.log('Игра готова!');
  </script>
</body>
</html>
